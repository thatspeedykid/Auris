name: Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install JS dependencies
        run: npm ci

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT
        shell: bash

      # Code signing — requires WINDOWS_CERTIFICATE and WINDOWS_CERTIFICATE_PASSWORD
      # secrets set in repo Settings > Secrets. Leave blank for unsigned dev builds.
      - name: Build and publish release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        with:
          tagName: v${{ steps.version.outputs.VERSION }}
          releaseName: 'Auris v${{ steps.version.outputs.VERSION }}'
          releaseBody: |
            ## Auris v${{ steps.version.outputs.VERSION }} — by PrivacyChase

            See [CHANGELOG.md](https://github.com/thatspeedykid/Auris/blob/main/CHANGELOG.md) for what changed in this release.

            ### Downloads
            | File | Description |
            |------|-------------|
            | `Auris-Setup-${{ steps.version.outputs.VERSION }}-x64.exe` | Windows installer (recommended) |
            | `Auris-${{ steps.version.outputs.VERSION }}-x64.msi` | Windows MSI package |

            ### Verify your download
            SHA256 checksums are attached to this release. Verify with:
            ```powershell
            Get-FileHash Auris-Setup-${{ steps.version.outputs.VERSION }}-x64.exe -Algorithm SHA256
            ```

            ### Privacy
            This build makes zero network calls during normal operation.
            The source code for this exact release is available at the tag above.
          releaseDraft: true
          prerelease: ${{ contains(steps.version.outputs.VERSION, 'alpha') || contains(steps.version.outputs.VERSION, 'beta') }}
          args: --target x86_64-pc-windows-msvc

      - name: Generate SHA256 checksums
        run: |
          $files = Get-ChildItem "src-tauri/target/x86_64-pc-windows-msvc/release/bundle/" -Recurse -Include "*.exe","*.msi"
          foreach ($file in $files) {
            $hash = Get-FileHash $file.FullName -Algorithm SHA256
            "$($hash.Hash)  $($file.Name)" | Out-File -Append "SHA256SUMS.txt"
          }
        shell: pwsh

      - name: Upload checksums to release
        uses: softprops/action-gh-release@v2
        with:
          files: SHA256SUMS.txt
          token: ${{ secrets.GITHUB_TOKEN }}
